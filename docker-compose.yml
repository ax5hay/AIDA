services:
  postgres:
    image: postgres:16-alpine
    container_name: aida-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aida
      POSTGRES_PASSWORD: aida
      POSTGRES_DB: aida
    volumes:
      - aida_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aida -d aida"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: aida-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://aida:aida@postgres:5432/aida
      WEB_ORIGIN: http://localhost:3000
      API_PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/v1
    container_name: aida-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  aida_pg_data:
